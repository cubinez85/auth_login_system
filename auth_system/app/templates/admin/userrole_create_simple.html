{% extends 'admin/master.html' %}
{% block body %}
<div class="container">
    <h2>👤→🎭 Назначение роли пользователю</h2>
    <div class="card mt-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">📝 Выбор пользователя и роли</h5>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('userrole_create.index') }}">
                <div class="mb-3">
                    <label for="user_id" class="form-label">Пользователь *</label>
                    <select class="form-select" id="user_id" name="user_id" required>
                        <option value="">-- Выберите пользователя --</option>
                        {% for user in users %}
                            <option value="{{ user.id }}">{{ user.email }} ({{ user.get_full_name() }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="role_id" class="form-label">Роль *</label>
                    <select class="form-select" id="role_id" name="role_id" required>
                        <option value="">-- Выберите роль --</option>
                        {% for role in roles %}
                            <option value="{{ role.id }}">{{ role.name }} — {{ role.description or '' }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-success btn-lg">✅ Назначить роль</button>
                    <a href="{{ url_for('userrole_list.index_view') }}" class="btn btn-secondary btn-lg">← Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
