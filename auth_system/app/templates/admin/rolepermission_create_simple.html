{% extends 'admin/master.html' %}
{% block body %}
<div class="container">
    <h2>🎭→🔑 Назначение разрешения роли</h2>
    <div class="card mt-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">📝 Выбор роли и разрешения</h5>
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('rolepermission_create.index') }}">
                <div class="mb-3">
                    <label for="role_id" class="form-label">Роль *</label>
                    <select class="form-select" id="role_id" name="role_id" required>
                        <option value="">-- Выберите роль --</option>
                        {% for role in roles %}
                            <option value="{{ role.id }}">{{ role.name }} — {{ role.description or '' }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label for="permission_id" class="form-label">Разрешение *</label>
                    <select class="form-select" id="permission_id" name="permission_id" required>
                        <option value="">-- Выберите разрешение --</option>
                        {% for perm in permissions %}
                            <option value="{{ perm.id }}">{{ perm.resource.name }}:{{ perm.action.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-success btn-lg">✅ Назначить разрешение</button>
                    <a href="{{ url_for('rolepermission_list.index_view') }}" class="btn btn-secondary btn-lg">← Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
