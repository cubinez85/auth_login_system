server {
    listen 80;
    server_name auth.cubinez.ru;

    access_log /var/log/nginx/auth_system_access.log;
    error_log /var/log/nginx/auth_system_error.log;

    # Буферы для больших заголовков
    client_max_body_size 10M;

    # 🔐 Basic Auth для админки
    location /admin {
        auth_basic "🔐 Admin Area - Authentication Required";
        auth_basic_user_file /etc/nginx/.htpasswd;
        
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🔐 Basic Auth для Admin API (опционально)
    location /api/admin {
        auth_basic "🔐 Admin API - Authentication Required";
        auth_basic_user_file /etc/nginx/.htpasswd;
        
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 🌐 Публичный API — без Basic Auth
    location /api {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика
    location /static {
        alias /var/www/auth_system/app/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri @fallback;
    }
    
    location @fallback {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all
    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
