server {
    listen 80;
    server_name auth.cubinez.ru;

    access_log /var/log/nginx/auth_system_access.log;
    error_log /var/log/nginx/auth_system_error.log;

    # Основной прокси - обрабатывает ВСЕ запросы, включая /admin
    location / {
        include proxy_params;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Статика обслуживается напрямую nginx
    location /static {
        alias /var/www/auth_system/app/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
